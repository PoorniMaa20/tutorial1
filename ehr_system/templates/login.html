{% load static %}

<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login</title>
        <link rel="stylesheet" href="{% static 'css/login.css' %}">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.3.1/dist/css/bootstrap.min.css" integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T" crossorigin="anonymous">
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.3.1/dist/js/bootstrap.min.js" integrity="sha384-JjSmVgyd0p3pXB1rRibZUAYoIIy6OrQ6VrjIEaFf/nJGzIxFDsf4x0xIM+B07jRM" crossorigin="anonymous"></script>
        <script src="https://code.jquery.com/jquery-3.3.1.slim.min.js" integrity="sha384-q8i/X+965DzO0rT7abK41JStQIAqVgRVzpbzo5smXKp4YfRvH+8abtTE1Pi6jizo" crossorigin="anonymous"></script>
        <script src="https://cdn.jsdelivr.net/npm/popper.js@1.14.7/dist/umd/popper.min.js" integrity="sha384-UO2eT0CpHqdSJQ6hJty5KVphtPhzWj9WO1clHTMGa3JDZwrnQq4sF86dIHNDz0W1" crossorigin="anonymous"></script>
    </head>
<body>
<div class="login-container">
    <div class="container">
        <div class="row">
            <div class="col-12 d-flex justify-content-center align-items-center">
                <div class="login-card shadow p-4">
                    <h2 class="login-title">Log in</h2>
                    <p class="signup-text">Need an account?
                    <a href="{% url 'register' %}">Create an account</a></p>
                    <form method="POST" autocomplete="off">
                        {% csrf_token %}
                        <label>Username</label>
                        <input type="text" name="username" class="form-control">
                        <label class="mt-3">Password</label>
                        <div class="password-box">
                            <input type="password" name="password" class="form-control" id="password">
                            <span onclick="togglePassword()">Show</span>
                        </div>           
                        <button type="submit" class="btn btn-primary login-btn mt-3">Log in</button>
                        {% if messages %}
                            {% for message in messages %}
                                <div class="alert alert-danger text-center">
                                    {{ message }}
                                </div>
                            {% endfor %}
                        {% endif %}
                    </form>
                </div>
            </div>        
        </div>
    </div>
</div>
<script>
function togglePassword() {
    let input = document.getElementById("password");
    input.type = input.type === "password" ? "text" : "password";
}
</script>

</body>
</html>
